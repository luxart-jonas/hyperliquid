<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="HL Balance">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#0a0a0a">
<link rel="manifest" href="data:application/json,{%22name%22:%22HL%20Balance%22,%22short_name%22:%22HL%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%230a0a0a%22,%22theme_color%22:%22%230a0a0a%22}">
<title>HL Balance</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#0a0a0a; color:#fff;
    font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height:100vh; display:flex; flex-direction:column;
    align-items:center; justify-content:center; padding:2rem;
  }
  .label { font-size:16px; letter-spacing:0.12em; text-transform:uppercase; color:#888; margin-bottom:12px; }
  .total { font-size:76px; font-weight:700; letter-spacing:-3px; line-height:1; color:#fff; }
  .currency { font-size:28px; font-weight:400; color:#999; margin-left:6px; }
  .cards { display:flex; gap:16px; margin-top:2.4rem; width:100%; max-width:360px; }
  .card { flex:1; background:#141414; border:1px solid #222; border-radius:14px; padding:16px; display:flex; flex-direction:column; gap:8px; }
  .card-label { font-size:13px; letter-spacing:0.1em; text-transform:uppercase; color:#666; }
  .card-value { font-size:24px; font-weight:600; color:#ddd; }
  .pos { color:#4ade80; }
  .neg { color:#f87171; }
  .neu { color:#555; }
  .coin-tag { font-size:12px; color:#555; letter-spacing:0.06em; }
  .divider { width:40px; height:1px; background:#1e1e1e; margin:2.4rem 0; }
  .meta { font-size:14px; color:#444; }
  .refresh-btn {
    margin-top:2rem; background:none; border:1px solid #252525; color:#666;
    font-size:13px; letter-spacing:0.12em; text-transform:uppercase;
    padding:12px 28px; border-radius:99px; cursor:pointer;
  }
  .refresh-btn:active { border-color:#555; color:#bbb; }
  .loading { color:#222; animation:pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:.3} 50%{opacity:1} }
</style>
</head>
<body>

<div class="label">Kontostand</div>
<div id="total" class="total loading">…</div>

<div class="cards">
  <div class="card">
    <div class="card-label">Unrealized PnL</div>
    <div id="pnl" class="card-value neu">—</div>
    <div id="coin" class="coin-tag"></div>
  </div>
  <div class="card">
    <div class="card-label">Reserviert</div>
    <div id="hold" class="card-value">—</div>
  </div>
</div>

<div class="divider"></div>
<div id="updated" class="meta">wird geladen…</div>
<button class="refresh-btn" onclick="load()">↺ Aktualisieren</button>

<script>
const WALLET = '0x6236aDdD817F8f364b9Ea2D390341fBdFb35B15B';

function fmt(n) {
  return parseFloat(n||0).toLocaleString('de-DE', {minimumFractionDigits:2, maximumFractionDigits:2});
}

async function q(body) {
  const r = await fetch('https://api.hyperliquid.xyz/info', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify(body)
  });
  return r.json();
}

async function load() {
  document.getElementById('total').className = 'total loading';
  document.getElementById('total').textContent = '…';
  try {
    const [spotData, xyzData] = await Promise.all([
      q({type:'spotClearinghouseState', user:WALLET}),
      q({type:'clearinghouseState', user:WALLET, dex:'xyz'})
    ]);
    const usdc = (spotData.balances||[]).find(b=>b.coin==='USDC') || {};
    const spotTotal = parseFloat(usdc.total||0);
    const holdVal   = parseFloat(usdc.hold||0);
    let pnl = 0, coins = [];
    for (const p of (xyzData.assetPositions||[])) {
      pnl += parseFloat(p?.position?.unrealizedPnl||0);
      if (p?.position?.coin) coins.push(p.position.coin.replace('xyz:',''));
    }
    document.getElementById('total').className = 'total';
    document.getElementById('total').innerHTML = fmt(spotTotal) + '<span class="currency">$</span>';
    const pnlEl = document.getElementById('pnl');
    pnlEl.textContent = pnl === 0 ? '—' : (pnl>=0?'+':'') + fmt(pnl) + ' $';
    pnlEl.className = 'card-value ' + (pnl>0?'pos':pnl<0?'neg':'neu');
    document.getElementById('coin').textContent = coins.join(', ');
    document.getElementById('hold').textContent = fmt(holdVal) + ' $';
    document.getElementById('updated').textContent =
      'Stand: ' + new Date().toLocaleTimeString('de-DE', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  } catch(e) {
    const el = document.getElementById('total');
    el.className='total'; el.style.fontSize='18px'; el.style.color='#f87171';
    el.textContent='Fehler: '+e.message;
  }
}

// PWA Icon als Canvas generieren und als apple-touch-icon einsetzen
function generateIcon() {
  const canvas = document.createElement('canvas');
  canvas.width = 192; canvas.height = 192;
  const ctx = canvas.getContext('2d');
  // Hintergrund
  ctx.fillStyle = '#0a0a0a';
  ctx.beginPath();
  ctx.roundRect(0, 0, 192, 192, 32);
  ctx.fill();
  // Grünes H
  ctx.fillStyle = '#4ade80';
  ctx.font = 'bold 130px -apple-system, BlinkMacSystemFont, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('H', 96, 100);
  const dataUrl = canvas.toDataURL('image/png');
  // Als apple-touch-icon einsetzen
  let link = document.querySelector("link[rel='apple-touch-icon']");
  if (!link) { link = document.createElement('link'); link.rel = 'apple-touch-icon'; document.head.appendChild(link); }
  link.href = dataUrl;
  // Auch als normales favicon
  let fav = document.querySelector("link[rel='icon']");
  if (!fav) { fav = document.createElement('link'); fav.rel = 'icon'; document.head.appendChild(fav); }
  fav.href = dataUrl;
}

generateIcon();
load();
setInterval(load, 30000);
</script>
</body>
</html>
