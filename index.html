<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="HL Points">
<meta name="theme-color" content="#f0f4ff">
<title>HL Points</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: linear-gradient(160deg, #e8f0ff 0%, #f5e8ff 100%);
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    color: #1a1a2e;
  }

  /* Balken */
  .bar-wrap {
    width: 100%;
    max-width: 340px;
    margin-bottom: 2.5rem;
  }
  .bar-labels {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: #888;
    margin-bottom: 6px;
    font-weight: 600;
    letter-spacing: 0.05em;
  }
  .bar-track {
    height: 18px;
    background: #dde4f5;
    border-radius: 99px;
    position: relative;
    overflow: hidden;
  }
  .bar-fill {
    position: absolute;
    top: 0; bottom: 0;
    left: 50%;
    width: 0;
    border-radius: 99px;
    transition: width 0.6s cubic-bezier(.4,0,.2,1), background 0.4s;
  }
  .bar-fill.pos { transform-origin: left; background: linear-gradient(90deg, #6ee7b7, #34d399); }
  .bar-fill.neg { transform-origin: right; left: auto; right: 50%; background: linear-gradient(90deg, #fca5a5, #f87171); }
  .bar-center {
    position: absolute;
    top: 0; bottom: 0;
    left: 50%;
    width: 2px;
    background: #fff;
    transform: translateX(-50%);
  }

  /* Punkte */
  .points-label {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #9ca3af;
    margin-bottom: 8px;
  }
  .points {
    font-size: 96px;
    font-weight: 800;
    line-height: 1;
    letter-spacing: -4px;
    transition: color 0.4s;
  }
  .points.pos { color: #059669; }
  .points.neg { color: #dc2626; }
  .points.zero { color: #9ca3af; }

  /* Bewertung */
  .rating {
    margin-top: 1.2rem;
    font-size: 22px;
    font-weight: 700;
    text-align: center;
    line-height: 1.4;
    min-height: 60px;
    transition: color 0.4s;
  }
  .rating.pos { color: #047857; }
  .rating.neg { color: #b91c1c; }
  .rating.zero { color: #9ca3af; }

  /* Kontostand Button */
  .balance-btn {
    margin-top: 3rem;
    background: rgba(255,255,255,0.6);
    border: 1.5px solid rgba(180,180,220,0.4);
    color: #6b7280;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 10px 24px;
    border-radius: 99px;
    cursor: pointer;
    backdrop-filter: blur(8px);
    transition: background 0.2s;
  }
  .balance-btn:active { background: rgba(255,255,255,0.9); }

  .balance-display {
    margin-top: 0.8rem;
    font-size: 15px;
    color: #6b7280;
    font-weight: 600;
    min-height: 22px;
    transition: opacity 0.3s;
  }

  .updated {
    margin-top: 2rem;
    font-size: 11px;
    color: #c4c9d8;
    letter-spacing: 0.06em;
  }

  .loading-pulse {
    animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:.3} 50%{opacity:.8} }
</style>
</head>
<body>

<div class="bar-wrap">
  <div class="bar-labels"><span>-30</span><span>0</span><span>+30</span></div>
  <div class="bar-track">
    <div class="bar-fill" id="bar"></div>
    <div class="bar-center"></div>
  </div>
</div>

<div class="points-label">Punkte</div>
<div class="points zero loading-pulse" id="points">·</div>
<div class="rating zero" id="rating">wird geladen…</div>

<button class="balance-btn" onclick="toggleBalance()">Kontostand anzeigen</button>
<div class="balance-display" id="balance-display"></div>

<div class="updated" id="updated"></div>

<script>
const WALLET = '0x6236addd817f8f364b9ea2d390341fbdfb35b15b';
const REFERENZ = 400;

let balanceVisible = false;
let lastBalance = 0;

const RATINGS_POS = [
  { min: 1,  text: '👍 Ok! Du bist im Plus.' },
  { min: 6,  text: '✨ Gut gemacht! Läuft.' },
  { min: 11, text: '🔥 Stark! Das macht Spaß.' },
  { min: 16, text: '💪 Sehr stark! Bleib dran.' },
  { min: 21, text: '🚀 Ausgezeichnet! Top-Tag!' },
  { min: 26, text: '🏆 Überragend! Absoluter Lauf!' },
];
const RATINGS_NEG = [
  { min: -5,  text: '😐 Leicht im Minus. Kein Stress.' },
  { min: -10, text: '🤔 Aufpassen. Der Markt testet dich.' },
  { min: -15, text: '⚠️ Das zwickt. Bleibt der Plan?' },
  { min: -20, text: '😬 Starkes Minus. Kopf klar halten.' },
  { min: -25, text: '🛑 Sehr tief. Wirklich noch drin bleiben?' },
  { min: -30, text: '🆘 Stopp. Jetzt wäre Aussteigen mutig.' },
];

function getRating(pts) {
  if (pts === 0) return { text: '— Noch neutral.', cls: 'zero' };
  if (pts > 0) {
    const r = [...RATINGS_POS].reverse().find(r => pts >= r.min);
    return { text: r ? r.text : RATINGS_POS[0].text, cls: 'pos' };
  } else {
    const r = [...RATINGS_NEG].find(r => pts >= r.min);
    return { text: r ? r.text : RATINGS_NEG[RATINGS_NEG.length-1].text, cls: 'neg' };
  }
}

function updateUI(pnl, balance) {
  // Punkte = pnl / (balance / REFERENZ)
  const multiplier = balance > 0 ? balance / REFERENZ : 1;
  const pts = Math.round(pnl / multiplier * 10) / 10;
  const ptsDisplay = pts > 0 ? '+' + pts.toFixed(1) : pts.toFixed(1);
  const ptsEl = document.getElementById('points');
  const barEl = document.getElementById('bar');
  const ratingEl = document.getElementById('rating');

  ptsEl.classList.remove('loading-pulse');
  ptsEl.textContent = pts === 0 ? '0' : ptsDisplay;
  ptsEl.className = 'points ' + (pts > 0 ? 'pos' : pts < 0 ? 'neg' : 'zero');

  // Balken
  const clamped = Math.max(-30, Math.min(30, pts));
  const pct = Math.abs(clamped) / 30 * 50; // max 50% jeder Seite
  barEl.style.width = pct + '%';
  barEl.className = 'bar-fill ' + (pts >= 0 ? 'pos' : 'neg');

  // Bewertung
  const { text, cls } = getRating(pts);
  ratingEl.textContent = text;
  ratingEl.className = 'rating ' + cls;

  // Kontostand (versteckt)
  lastBalance = balance;
  if (balanceVisible) {
    document.getElementById('balance-display').textContent =
      balance.toLocaleString('de-DE', {minimumFractionDigits:2, maximumFractionDigits:2}) + ' $';
  }

  document.getElementById('updated').textContent =
    'Stand: ' + new Date().toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}

async function load() {
  try {
    const [spotData, xyzData] = await Promise.all([
      fetch('https://api.hyperliquid.xyz/info', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({type:'spotClearinghouseState', user:WALLET})
      }).then(r=>r.json()),
      fetch('https://api.hyperliquid.xyz/info', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({type:'clearinghouseState', user:WALLET, dex:'xyz'})
      }).then(r=>r.json())
    ]);

    const usdc = (spotData.balances||[]).find(b=>b.coin==='USDC')||{};
    const balance = parseFloat(usdc.total||0);

    let pnl = 0;
    for (const p of (xyzData.assetPositions||[])) {
      pnl += parseFloat(p?.position?.unrealizedPnl||0);
    }

    updateUI(pnl, balance);
  } catch(e) {
    document.getElementById('rating').textContent = 'Fehler beim Laden';
  }
}

function toggleBalance() {
  balanceVisible = !balanceVisible;
  const el = document.getElementById('balance-display');
  const btn = document.querySelector('.balance-btn');
  if (balanceVisible) {
    el.textContent = lastBalance.toLocaleString('de-DE', {minimumFractionDigits:2, maximumFractionDigits:2}) + ' $';
    btn.textContent = 'Kontostand verbergen';
    // Nach 5 Sekunden automatisch ausblenden
    setTimeout(() => {
      balanceVisible = false;
      el.textContent = '';
      btn.textContent = 'Kontostand anzeigen';
    }, 5000);
  } else {
    el.textContent = '';
    btn.textContent = 'Kontostand anzeigen';
  }
}

// Icon
const cv=document.createElement('canvas');cv.width=cv.height=192;
const cx=cv.getContext('2d');
cx.fillStyle='#e8f0ff';cx.fillRect(0,0,192,192);
cx.fillStyle='#059669';cx.font='bold 110px sans-serif';
cx.textAlign='center';cx.textBaseline='middle';cx.fillText('P',96,105);
const u=cv.toDataURL();
['apple-touch-icon','icon'].forEach(r=>{let l=document.querySelector("link[rel='"+r+"']");if(!l){l=document.createElement('link');l.rel=r;document.head.appendChild(l);}l.href=u;});

load();
setInterval(load, 30000);
</script>
</body>
</html>
