<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="HL Points">
<meta name="theme-color" content="#f0f4ff">
<title>HL Points</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: linear-gradient(160deg, #e8f0ff 0%, #f5e8ff 100%);
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    color: #1a1a2e;
  }
  .bar-wrap { width:100%; max-width:340px; margin-bottom:2.5rem; }
  .bar-labels { display:flex; justify-content:space-between; font-size:12px; color:#aaa; margin-bottom:6px; font-weight:600; }
  .bar-track { height:18px; background:#dde4f5; border-radius:99px; position:relative; overflow:hidden; }
  .bar-fill { position:absolute; top:0; bottom:0; left:50%; width:0; border-radius:99px; transition:width 0.6s cubic-bezier(.4,0,.2,1); }
  .bar-fill.pos { background:linear-gradient(90deg,#6ee7b7,#34d399); }
  .bar-fill.neg { left:auto; right:50%; background:linear-gradient(90deg,#fca5a5,#f87171); }
  .bar-center { position:absolute; top:0; bottom:0; left:50%; width:2px; background:#fff; transform:translateX(-50%); }

  .coin-info { font-size:13px; font-weight:600; color:#a5b4d0; letter-spacing:0.1em; text-transform:uppercase; margin-bottom:6px; }
  .entry-info { font-size:12px; color:#c4cfe8; margin-bottom:1.5rem; }

  .points-label { font-size:13px; font-weight:700; letter-spacing:0.15em; text-transform:uppercase; color:#9ca3af; margin-bottom:8px; }
  .points { font-size:96px; font-weight:800; line-height:1; letter-spacing:-4px; transition:color 0.4s; }
  .points.pos { color:#059669; }
  .points.neg { color:#dc2626; }
  .points.zero { color:#9ca3af; }

  .rating { margin-top:1.2rem; font-size:22px; font-weight:700; text-align:center; line-height:1.4; min-height:60px; transition:color 0.4s; }
  .rating.pos { color:#047857; }
  .rating.neg { color:#b91c1c; }
  .rating.zero { color:#9ca3af; }

  .btn-row { display:flex; gap:10px; margin-top:3rem; align-items:center; }
  .balance-btn, .ref-btn, .hl-btn {
    background:rgba(255,255,255,0.6); border:1.5px solid rgba(180,180,220,0.4);
    color:#6b7280; font-size:13px; font-weight:600; letter-spacing:0.08em;
    text-transform:uppercase; padding:10px 16px; border-radius:99px; cursor:pointer;
    backdrop-filter:blur(8px); transition:background 0.2s; text-decoration:none;
    display:inline-block;
  }
  .ref-btn { font-size:16px; padding:8px 13px; letter-spacing:0; }
  .hl-btn  { font-size:16px; padding:8px 13px; letter-spacing:0; }
  .balance-btn:active, .ref-btn:active, .hl-btn:active { background:rgba(255,255,255,0.9); }

  .balance-display { margin-top:0.8rem; font-size:15px; color:#6b7280; font-weight:600; min-height:22px; }
  .vola-display { margin-top:0.3rem; font-size:11px; color:#b0b8d0; }

  .modal-bg {
    position:fixed; inset:0; background:rgba(100,100,150,0.25);
    backdrop-filter:blur(6px); display:none; align-items:center; justify-content:center; z-index:100;
  }
  .modal-bg.show { display:flex; }
  .modal {
    background:#fff; border-radius:24px; padding:2rem; width:90%; max-width:320px;
    box-shadow:0 20px 60px rgba(100,100,200,0.15); display:flex; flex-direction:column; gap:1rem;
  }
  .modal h3 { font-size:18px; font-weight:700; color:#1a1a2e; }
  .modal p { font-size:13px; color:#9ca3af; line-height:1.5; }
  .input-row { display:flex; align-items:center; gap:10px; }
  .modal input {
    flex:1; background:#f3f4f6; border:1.5px solid #e5e7eb; color:#1a1a2e;
    font-size:32px; font-weight:700; padding:12px 16px; border-radius:14px;
    outline:none; text-align:center; width:100%;
  }
  .modal input:focus { border-color:#a5b4fc; }
  .pct-label { font-size:24px; font-weight:700; color:#9ca3af; }
  .modal-btns { display:flex; gap:8px; }
  .btn-save  { flex:1; background:#6366f1; color:#fff; border:none; font-size:15px; font-weight:700; padding:12px; border-radius:12px; cursor:pointer; }
  .btn-reset { flex:1; background:#f3f4f6; color:#6b7280; border:none; font-size:15px; font-weight:600; padding:12px; border-radius:12px; cursor:pointer; }
  .btn-cancel { background:none; border:none; color:#d1d5db; font-size:13px; cursor:pointer; text-align:center; padding:4px; }

  .updated { margin-top:1.5rem; font-size:11px; color:#c4c9d8; letter-spacing:0.06em; }
  .loading-pulse { animation:pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:.3} 50%{opacity:.8} }
</style>
</head>
<body>

<div class="bar-wrap">
  <div class="bar-labels"><span>-30</span><span>0</span><span>+30</span></div>
  <div class="bar-track">
    <div class="bar-fill" id="bar"></div>
    <div class="bar-center"></div>
  </div>
</div>

<div class="coin-info" id="coin-info"></div>
<div class="entry-info" id="entry-info"></div>

<div class="points-label">Punkte</div>
<div class="points zero loading-pulse" id="points">·</div>
<div class="rating zero" id="rating">wird geladen…</div>

<div class="btn-row">
  <button class="balance-btn" onclick="toggleBalance()">Kontostand</button>
  <button class="ref-btn" onclick="openModal()" title="Vola anpassen">⚙️</button>
  <a class="hl-btn" href="https://app.hyperliquid.xyz" target="_blank" title="Hyperliquid öffnen">🔗</a>
</div>
<div class="balance-display" id="balance-display"></div>
<div class="vola-display" id="vola-display"></div>
<div class="updated" id="updated"></div>

<!-- Modal -->
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <h3>Vola-Anpassung</h3>
    <p>Wie viel % Bewegung entsprechen 30 Punkten? Standard: 4%</p>
    <div class="input-row">
      <input type="number" id="vola-input" placeholder="4" min="0.5" max="20" step="0.5">
      <span class="pct-label">%</span>
    </div>
    <div class="modal-btns">
      <button class="btn-reset" onclick="resetVola()">Reset (4%)</button>
      <button class="btn-save" onclick="saveVola()">Speichern</button>
    </div>
    <button class="btn-cancel" onclick="closeModal()">Abbrechen</button>
  </div>
</div>

<script>
const WALLET  = '0x6236addd817f8f364b9ea2d390341fbdfb35b15b';
const MAX_PTS = 30;
const DEFAULT_VOLA = 4;

let balanceVisible = false;
let lastBalance    = 0;
let maxPct = parseFloat(localStorage.getItem('hl_vola') || DEFAULT_VOLA);

const RATINGS_POS = [
  { min: 1,  text: '👍 Ok! Du bist im Plus.' },
  { min: 6,  text: '✨ Gut gemacht! Läuft.' },
  { min: 11, text: '🔥 Stark! Das macht Spaß.' },
  { min: 16, text: '💪 Sehr stark! Bleib dran.' },
  { min: 21, text: '🚀 Ausgezeichnet! Top-Tag!' },
  { min: 26, text: '🏆 Überragend! Absoluter Lauf!' },
];
const RATINGS_NEG = [
  { min: -5,  text: '😐 Leicht im Minus. Kein Stress.' },
  { min: -10, text: '🤔 Aufpassen. Der Markt testet dich.' },
  { min: -15, text: '⚠️ Das zwickt. Bleibt der Plan?' },
  { min: -20, text: '😬 Starkes Minus. Kopf klar halten.' },
  { min: -25, text: '🛑 Sehr tief. Wirklich noch drin bleiben?' },
  { min: -999, text: '🆘 Stopp. Jetzt wäre Aussteigen mutig.' },
];

function getRating(pts) {
  if (Math.abs(pts) < 0.5) return { text: '— Noch neutral.', cls: 'zero' };
  if (pts > 0) {
    const r = [...RATINGS_POS].reverse().find(r => pts >= r.min);
    return { text: r ? r.text : RATINGS_POS[0].text, cls: 'pos' };
  } else {
    const r = RATINGS_NEG.find(r => pts >= r.min);
    return { text: r ? r.text : RATINGS_NEG[RATINGS_NEG.length-1].text, cls: 'neg' };
  }
}

function updateVolaDisplay() {
  const el = document.getElementById('vola-display');
  el.textContent = maxPct !== DEFAULT_VOLA
    ? 'Vola: ' + maxPct + '% = 30 Punkte'
    : 'Vola: 4% = 30 Punkte (Standard)';
}

function updateUI(positions, balance, markPrices) {
  lastBalance = balance;

  if (!positions || positions.length === 0) {
    document.getElementById('points').className = 'points zero';
    document.getElementById('points').textContent = '0';
    document.getElementById('points').classList.remove('loading-pulse');
    document.getElementById('rating').className = 'rating zero';
    document.getElementById('rating').textContent = '— Keine offene Position.';
    document.getElementById('coin-info').textContent = '';
    document.getElementById('entry-info').textContent = '';
    document.getElementById('bar').style.width = '0%';
    document.getElementById('updated').textContent =
      'Stand: ' + new Date().toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
    return;
  }

  const pos = positions[0].position;
  const coin = pos.coin;
  const entryPx = parseFloat(pos.entryPx);
  const szi = parseFloat(pos.szi);
  const isShort = szi < 0;
  const markPx = parseFloat(markPrices?.[coin] || entryPx);

  const pctChange = (markPx - entryPx) / entryPx * 100;
  const pctForUs  = isShort ? -pctChange : pctChange;
  const pts = Math.round(pctForUs / maxPct * MAX_PTS * 10) / 10;

  const ptsEl = document.getElementById('points');
  ptsEl.classList.remove('loading-pulse');
  ptsEl.textContent = Math.abs(pts) < 0.05 ? '0' : (pts > 0 ? '+' : '') + pts.toFixed(1);
  ptsEl.className = 'points ' + (pts > 0.05 ? 'pos' : pts < -0.05 ? 'neg' : 'zero');

  const clamped = Math.max(-30, Math.min(30, pts));
  const barEl = document.getElementById('bar');
  barEl.style.width = (Math.abs(clamped) / 30 * 50) + '%';
  barEl.className = 'bar-fill ' + (pts >= 0 ? 'pos' : 'neg');

  const { text, cls } = getRating(pts);
  document.getElementById('rating').textContent = text;
  document.getElementById('rating').className = 'rating ' + cls;

  const name = coin.replace('xyz:', '');
  document.getElementById('coin-info').textContent = name + ' · ' + (isShort ? 'Short' : 'Long');
  document.getElementById('entry-info').textContent =
    'Entry: ' + entryPx.toFixed(3) + ' · Jetzt: ' + markPx.toFixed(3) +
    ' (' + (pctChange >= 0 ? '+' : '') + pctChange.toFixed(2) + '%)';

  if (balanceVisible) {
    document.getElementById('balance-display').textContent =
      balance.toLocaleString('de-DE', {minimumFractionDigits:2, maximumFractionDigits:2}) + ' $';
  }
  document.getElementById('updated').textContent =
    'Stand: ' + new Date().toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}

async function load() {
  try {
    const [spotData, xyzData, midsData] = await Promise.all([
      fetch('https://api.hyperliquid.xyz/info', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({type:'spotClearinghouseState', user:WALLET})}).then(r=>r.json()),
      fetch('https://api.hyperliquid.xyz/info', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({type:'clearinghouseState', user:WALLET, dex:'xyz'})}).then(r=>r.json()),
      fetch('https://api.hyperliquid.xyz/info', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({type:'allMids', dex:'xyz'})}).then(r=>r.json())
    ]);
    const usdc = (spotData.balances||[]).find(b=>b.coin==='USDC')||{};
    updateUI(xyzData.assetPositions||[], parseFloat(usdc.total||0), midsData);
  } catch(e) {
    document.getElementById('rating').textContent = 'Fehler beim Laden';
  }
}

function toggleBalance() {
  balanceVisible = !balanceVisible;
  const el  = document.getElementById('balance-display');
  const btn = document.querySelector('.balance-btn');
  if (balanceVisible) {
    el.textContent = lastBalance.toLocaleString('de-DE', {minimumFractionDigits:2, maximumFractionDigits:2}) + ' $';
    btn.textContent = 'Verbergen';
    setTimeout(() => { balanceVisible=false; el.textContent=''; btn.textContent='Kontostand'; }, 5000);
  } else {
    el.textContent = '';
    btn.textContent = 'Kontostand';
  }
}

function openModal() {
  document.getElementById('vola-input').value = maxPct;
  document.getElementById('modal-bg').classList.add('show');
  setTimeout(() => document.getElementById('vola-input').focus(), 100);
}
function closeModal() { document.getElementById('modal-bg').classList.remove('show'); }
function saveVola() {
  const val = parseFloat(document.getElementById('vola-input').value);
  if (val > 0) { maxPct = val; localStorage.setItem('hl_vola', val); }
  closeModal(); updateVolaDisplay(); load();
}
function resetVola() {
  maxPct = DEFAULT_VOLA; localStorage.removeItem('hl_vola');
  closeModal(); updateVolaDisplay(); load();
}
document.getElementById('vola-input').addEventListener('keydown', e => { if(e.key==='Enter') saveVola(); });
document.getElementById('modal-bg').addEventListener('click', e => { if(e.target===e.currentTarget) closeModal(); });

// Icon
const cv=document.createElement('canvas');cv.width=cv.height=192;
const cx=cv.getContext('2d');
cx.fillStyle='#e8f0ff';cx.fillRect(0,0,192,192);
cx.fillStyle='#059669';cx.font='bold 110px sans-serif';
cx.textAlign='center';cx.textBaseline='middle';cx.fillText('P',96,105);
const u=cv.toDataURL();
['apple-touch-icon','icon'].forEach(r=>{let l=document.querySelector("link[rel='"+r+"']");if(!l){l=document.createElement('link');l.rel=r;document.head.appendChild(l);}l.href=u;});

updateVolaDisplay();
load();
setInterval(load, 30000);
</script>
</body>
</html>
