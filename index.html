<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="HL Balance">
<meta name="theme-color" content="#0a0a0a">
<title>HL Balance</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0a0a0a; color:#fff; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:2rem; }
  .label { font-size:16px; letter-spacing:0.12em; text-transform:uppercase; color:#888; margin-bottom:12px; }
  .total { font-size:76px; font-weight:700; letter-spacing:-3px; line-height:1; color:#fff; }
  .currency { font-size:28px; font-weight:400; color:#999; margin-left:6px; }
  .cards { display:flex; gap:16px; margin-top:2.4rem; width:100%; max-width:360px; }
  .card { flex:1; background:#141414; border:1px solid #222; border-radius:14px; padding:16px; display:flex; flex-direction:column; gap:8px; }
  .card-label { font-size:13px; letter-spacing:0.1em; text-transform:uppercase; color:#666; }
  .card-value { font-size:24px; font-weight:600; color:#ddd; }
  .pos { color:#4ade80; } .neg { color:#f87171; } .neu { color:#555; }
  .coin-tag { font-size:12px; color:#555; }
  .divider { width:40px; height:1px; background:#1e1e1e; margin:2rem 0; }
  .meta { font-size:14px; color:#444; }
  .btn-close { width:100%; max-width:360px; margin-top:1.2rem; padding:16px; border-radius:14px; border:1px solid #2a1a1a; background:#1a1a1a; color:#f87171; font-size:16px; font-weight:600; cursor:pointer; }
  .btn-close:active { background:#2a1a1a; }
  .btn-close:disabled { opacity:0.4; cursor:not-allowed; }
  .btn-refresh { background:none; border:1px solid #252525; color:#666; font-size:13px; letter-spacing:0.12em; text-transform:uppercase; padding:12px 28px; border-radius:99px; cursor:pointer; margin-top:1.5rem; }
  .toast { position:fixed; bottom:2rem; left:50%; transform:translateX(-50%); background:#1a1a1a; border:1px solid #333; color:#fff; padding:12px 24px; border-radius:12px; font-size:14px; opacity:0; transition:opacity 0.3s; pointer-events:none; white-space:nowrap; z-index:999; }
  .toast.show { opacity:1; }
  .loading { color:#222; animation:pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:.3} 50%{opacity:1} }
</style>
</head>
<body>

<div class="label">Kontostand</div>
<div id="total" class="total loading">…</div>
<div class="cards">
  <div class="card">
    <div class="card-label">Unrealized PnL</div>
    <div id="pnl" class="card-value neu">—</div>
    <div id="coin" class="coin-tag"></div>
  </div>
  <div class="card">
    <div class="card-label">Reserviert</div>
    <div id="hold" class="card-value">—</div>
  </div>
</div>
<button id="close-btn" class="btn-close" style="display:none;" onclick="closeAll()">Alle Positionen schließen (Market)</button>
<div class="divider"></div>
<div id="updated" class="meta">wird geladen…</div>
<button class="btn-refresh" onclick="load()">↺ Aktualisieren</button>
<div class="toast" id="toast"></div>

<script type="module">
const WALLET = '0x6236addd817f8f364b9ea2d390341fbdfb35b15b';
const PRIV   = '0x4a1ba82e2124b34d79ce7f2bc48a156b4dba78150f579bd12482f1d733f12ba9';

let currentPositions = [];
let exchangeClient = null;

function fmt(n) { return parseFloat(n||0).toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2}); }

async function q(body) {
  const r = await fetch('https://api.hyperliquid.xyz/info',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  return r.json();
}

async function initSDK() {
  if (exchangeClient) return;
  try {
    const { ExchangeClient, HttpTransport } = await import('https://esm.sh/@nktkas/hyperliquid@0.20.0');
    const transport = new HttpTransport();
    exchangeClient = new ExchangeClient({ transport, wallet: PRIV });
  } catch(e) {
    console.error('SDK init failed:', e);
  }
}

window.closeAll = async function() {
  const btn = document.getElementById('close-btn');
  btn.disabled = true;
  btn.textContent = 'Wird geschlossen…';
  try {
    await initSDK();
    if (!exchangeClient) throw new Error('SDK nicht geladen');

    // Für jeden Position eine Market-Close Order
    const meta = await q({type:'meta', dex:'xyz'});
    const universe = meta?.universe || [];

    for (const pos of currentPositions) {
      const coinName = pos.position.coin.replace('xyz:','');
      const assetIdx = universe.findIndex(u => u.name === coinName);
      if (assetIdx < 0) { toast('Asset nicht gefunden: ' + coinName); continue; }

      const szi = parseFloat(pos.position.szi);
      const isBuy = szi < 0;
      const sz = Math.abs(szi);

      // Aktuellen Preis holen für slippage
      const mids = await q({type:'allMids'});
      const midPrice = parseFloat(mids?.['xyz:'+coinName] || 0);
      // 2% slippage
      const limitPx = isBuy
        ? (midPrice * 1.02).toFixed(4)
        : (midPrice * 0.98).toFixed(4);

      const result = await exchangeClient.order({
        orders: [{
          a: assetIdx,
          b: isBuy,
          p: limitPx,
          s: sz.toFixed(4),
          r: true,
          t: { limit: { tif: 'Ioc' } }
        }],
        grouping: 'na',
        dex: 'xyz'
      });
      console.log('order result:', JSON.stringify(result));
      const status = result?.response?.data?.statuses?.[0];
      if (status?.filled) toast('✓ Geschlossen: ' + coinName);
      else if (status?.error) toast('Fehler: ' + status.error);
      else toast('Antwort: ' + JSON.stringify(result).slice(0,60));
    }
    setTimeout(load, 2000);
  } catch(e) {
    toast('Fehler: ' + e.message);
    console.error(e);
    btn.disabled = false;
    btn.textContent = 'Alle Positionen schließen (Market)';
  }
}

window.load = async function() {
  document.getElementById('total').className = 'total loading';
  document.getElementById('total').textContent = '…';
  try {
    const [spotData, xyzData] = await Promise.all([
      q({type:'spotClearinghouseState', user:WALLET}),
      q({type:'clearinghouseState', user:WALLET, dex:'xyz'})
    ]);
    const usdc = (spotData.balances||[]).find(b=>b.coin==='USDC')||{};
    currentPositions = xyzData.assetPositions||[];
    let pnl=0, coins=[];
    for (const p of currentPositions) {
      pnl += parseFloat(p?.position?.unrealizedPnl||0);
      if (p?.position?.coin) coins.push(p.position.coin.replace('xyz:',''));
    }
    document.getElementById('total').className = 'total';
    document.getElementById('total').innerHTML = fmt(usdc.total)+'<span class="currency">$</span>';
    const pnlEl = document.getElementById('pnl');
    pnlEl.textContent = pnl===0?'—':(pnl>=0?'+':'')+fmt(pnl)+' $';
    pnlEl.className = 'card-value '+(pnl>0?'pos':pnl<0?'neg':'neu');
    document.getElementById('coin').textContent = coins.join(', ');
    document.getElementById('hold').textContent = fmt(usdc.hold)+' $';
    document.getElementById('updated').textContent = 'Stand: '+new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    const btn = document.getElementById('close-btn');
    if (currentPositions.length > 0) {
      btn.style.display = 'block';
      btn.textContent = 'Schließen: '+coins.join(', ')+' (Market)';
      btn.disabled = false;
    } else { btn.style.display = 'none'; }
  } catch(e) {
    document.getElementById('total').style.color='#f87171';
    document.getElementById('total').style.fontSize='16px';
    document.getElementById('total').textContent='Fehler: '+e.message;
  }
}

window.toast = function(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 5000);
}

// Icon
const c = document.createElement('canvas'); c.width=c.height=192;
const ctx = c.getContext('2d');
ctx.fillStyle='#0a0a0a'; ctx.beginPath(); ctx.roundRect(0,0,192,192,32); ctx.fill();
ctx.fillStyle='#4ade80'; ctx.font='bold 130px -apple-system,sans-serif';
ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('H',96,100);
const url = c.toDataURL();
['apple-touch-icon','icon'].forEach(rel=>{
  let l=document.querySelector(`link[rel='${rel}']`);
  if(!l){l=document.createElement('link');l.rel=rel;document.head.appendChild(l);}
  l.href=url;
});

// SDK vorladen
initSDK();
load();
setInterval(load, 30000);
</script>
</body>
</html>
